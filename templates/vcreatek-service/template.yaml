apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: vcreatek-service-template
  title: vCreatek Service Template
  description: >
    Creates a new vCreatek service with CI/CD pipeline,
    catalog registration, and documentation structure
    already configured. No manual setup required.
  tags:
    - recommended
    - vcreatek
    - service
spec:
  owner: group:devops-team
  type: service

  parameters:
    - title: Service Details
      required:
        - name
        - description
        - owner
      properties:
        name:
          title: Service Name
          type: string
          description: Unique name for this service e.g. customer-data-pipeline
          pattern: '^([a-z0-9]+-)*[a-z0-9]+$'
          ui:autofocus: true

        description:
          title: Description
          type: string
          description: What does this service do? Be specific.

        owner:
          title: Owner Team
          type: string
          description: Which vCreatek team owns this service?
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group

        lifecycle:
          title: Lifecycle Stage
          type: string
          description: Current stage of this service
          default: development
          enum:
            - experimental
            - development
            - staging
            - production

        serviceType:
          title: Service Type
          type: string
          description: What kind of service is this?
          default: service
          enum:
            - service
            - data-pipeline
            - ml-model
            - api
            - library

    - title: GitHub Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - vcreatek-demo

  steps:
    - id: fetch-template
      name: Generating project files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          lifecycle: ${{ parameters.lifecycle }}
          serviceType: ${{ parameters.serviceType }}
          repoUrl: ${{ parameters.repoUrl }}

    - id: publish
      name: Creating GitHub repository
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        repoVisibility: public
        defaultBranch: main
        protectDefaultBranch: true
        requiredApprovingReviewCount: 1

    - id: register
      name: Registering in vCreatek catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Open Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        url: ${{ steps['register'].output.entityRef }}